<title>투자 브리핑</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: #f9f9f8;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: #fff;
    border-bottom: 1px solid #e8e8e5;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #D97559, #c9622a);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .header h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.01em; }
  .header-meta { font-size: 13px; color: #8c8c8c; }
  .date-badge {
    background: #f4f4f0;
    border: 1px solid #e8e8e5;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    color: #5a5a5a;
    font-weight: 500;
  }

  /* Tabs */
  .tabs {
    background: #fff;
    border-bottom: 1px solid #e8e8e5;
    padding: 0 32px;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  .tab {
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 500;
    color: #8c8c8c;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    letter-spacing: -0.01em;
    position: relative;
    top: 1px;
    white-space: nowrap;
    user-select: none;
  }
  .tab:hover { color: #1a1a1a; }
  .tab.active {
    color: #D97559;
    border-bottom-color: #D97559;
  }
  .tab .ticker {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    background: #f4f4f0;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    color: #5a5a5a;
    pointer-events: none;
  }
  .tab.active .ticker { background: #fdf0ec; color: #D97559; }

  /* Legend */
  .legend {
    background: #fff;
    border-bottom: 1px solid #e8e8e5;
    padding: 7px 32px;
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #8c8c8c;
  }
  @media (max-width: 600px) {
    .legend { padding: 7px 16px; }
  }

  /* Content */
  .content {
    max-width: 840px;
    margin: 0 auto;
    padding: 28px 32px;
  }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #8c8c8c;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* Section title */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #8c8c8c;
    margin-bottom: 16px;
  }

  /* News card */
  .card {
    background: #fff;
    border: 1px solid #e8e8e5;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 12px;
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; line-height: 1.4; letter-spacing: -0.01em; display: flex; align-items: baseline; gap: 6px; }
  .card-title a { color: inherit; text-decoration: none; }
  .card-title a:hover { color: #D97559; text-decoration: underline; }
  .sentiment { font-size: 14px; flex-shrink: 0; }
  .source-badge {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 500;
    background: #f4f4f0;
    border: 1px solid #e8e8e5;
    color: #5a5a5a;
    padding: 3px 8px;
    border-radius: 5px;
    white-space: nowrap;
  }

  .summary { font-size: 13.5px; color: #3a3a3a; line-height: 1.6; margin-bottom: 12px; }

  .insight-box {
    background: #fdf8f6;
    border-left: 3px solid #D97559;
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    font-size: 13px;
    color: #5a3a2a;
    line-height: 1.6;
  }
  .insight-label { font-weight: 600; color: #D97559; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }

  /* Hype card */
  .hype-card {
    background: #fff;
    border: 1px solid #e8e8e5;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 12px;
    display: flex;
    gap: 18px;
    transition: box-shadow 0.15s;
  }
  .hype-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .hype-rank {
    flex-shrink: 0;
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #D97559, #c9622a);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: white;
  }
  .hype-rank.rank-1 { background: linear-gradient(135deg, #f5a623, #e8900f); }
  .hype-rank.rank-2 { background: linear-gradient(135deg, #9b9b9b, #7a7a7a); }
  .hype-rank.rank-3 { background: linear-gradient(135deg, #b87333, #9a6128); }
  .hype-body { flex: 1; min-width: 0; }
  .hype-title { font-size: 15px; font-weight: 600; color: #1a1a1a; line-height: 1.4; letter-spacing: -0.01em; margin-bottom: 6px; }
  .hype-title a { color: inherit; text-decoration: none; }
  .hype-title a:hover { color: #D97559; text-decoration: underline; }
  .hype-source { font-size: 11px; color: #8c8c8c; font-weight: 500; margin-bottom: 10px; }
  .hype-summary { font-size: 13.5px; color: #3a3a3a; line-height: 1.6; margin-bottom: 10px; }
  .hype-comment {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff8e6;
    border: 1px solid #f0d88a;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12.5px;
    color: #7a5f00;
    line-height: 1.5;
  }

  /* No news */
  .no-news {
    background: #f9f9f8;
    border: 1px dashed #d8d8d4;
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    color: #8c8c8c;
    font-size: 14px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 32px;
    font-size: 12px;
    color: #b0b0a8;
  }

  /* ── Mobile ─────────────────────────── */
  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .header h1 { font-size: 15px; }
    .header-meta { font-size: 12px; }
    .date-badge { font-size: 12px; padding: 5px 10px; }

    .tabs { padding: 0 8px; }
    .tab { padding: 12px 12px; font-size: 13px; }

    .content { padding: 16px 14px; }

    .card { padding: 16px 16px; border-radius: 10px; }
    .card-title { font-size: 14px; }
    .card-header { flex-direction: column; gap: 6px; }
    .source-badge { align-self: flex-start; }
    .summary { font-size: 13px; }
    .insight-box { font-size: 12.5px; }

    .hype-card { padding: 16px 16px; gap: 12px; border-radius: 10px; }
    .hype-rank { width: 30px; height: 30px; font-size: 13px; border-radius: 8px; }
    .hype-title { font-size: 14px; }
    .hype-summary { font-size: 13px; }
    .hype-comment { font-size: 12px; }

    .footer { padding: 24px 16px; }
  }
</style>
</head>

<script>
  // 탭 전환 — data-tab 속성 방식으로 변경 (Firefox 호환)
  document.getElementById('tab-bar').addEventListener('click', function(e) {
    var tab = e.target.closest('[data-tab]');
    if (!tab) return;
    var id = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('panel-' + id).classList.add('active');
  });

  // 날짜 포맷
  function fmtDate(str) {
    if (!str) return '—';
    var d = new Date(str);
    return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  }

  function fmtTime(str) {
    if (!str) return '';
    var d = new Date(str);
    return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) + ' 업데이트';
  }

  // 감성 아이콘
  function sentimentIcon(s) {
    if (s === 'positive') return '<span class="sentiment" title="긍정">🟢</span>';
    if (s === 'negative') return '<span class="sentiment" title="부정">🔴</span>';
    return '<span class="sentiment" title="중립">⚪</span>';
  }

  // 제목 (링크 있으면 a 태그, 없으면 span)
  function titleHtml(text, link) {
    if (link) return '<a href="' + link + '" target="_blank" rel="noopener">' + text + '</a>';
    return '<span>' + text + '</span>';
  }

  // 종목 뉴스 렌더링
  function renderStock(news, containerId) {
    var el = document.getElementById(containerId);
    if (!news || news.length === 0) {
      el.innerHTML = '<div class="no-news">오늘 주요 뉴스 없음</div>';
      return;
    }
    el.innerHTML = news.map(function(n) {
      return '<div class="card">' +
        '<div class="card-header">' +
          '<div class="card-title">' + sentimentIcon(n.sentiment) + titleHtml(n.title, n.link) + '</div>' +
          '<div class="source-badge">' + (n.time ? n.time + ' · ' : '') + n.source + '</div>' +
        '</div>' +
        '<div class="summary">' + n.summary + '</div>' +
        '<div class="insight-box">' +
          '<div class="insight-label">💡 투자 시사점</div>' +
          n.insight +
        '</div>' +
      '</div>';
    }).join('');
  }

  // Hype 뉴스 렌더링
  function renderHype(news) {
    var el = document.getElementById('hype-content');
    if (!news || news.length === 0) {
      el.innerHTML = '<div class="no-news">오늘 주요 뉴스 없음</div>';
      return;
    }
    var rankClass = ['rank-1', 'rank-2', 'rank-3', '', ''];
    el.innerHTML = news.map(function(n, i) {
      return '<div class="hype-card">' +
        '<div class="hype-rank ' + (rankClass[i] || '') + '">' + (i + 1) + '</div>' +
        '<div class="hype-body">' +
          '<div class="hype-title">' + sentimentIcon(n.sentiment) + titleHtml(n.title, n.link) + '</div>' +
          '<div class="hype-source">' + (n.time ? n.time + ' · ' : '') + n.source + '</div>' +
          '<div class="hype-summary">' + n.summary + '</div>' +
          '<div class="hype-comment">💬 ' + n.comment + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // 초기화
  window.addEventListener('DOMContentLoaded', function() {
    try {
      var raw = document.getElementById('briefing-data').textContent;
      var d = JSON.parse(raw);

      document.getElementById('date-badge').textContent = fmtDate(d.date);
      document.getElementById('update-time').textContent = fmtTime(d.updatedAt);

      renderStock(d.iren, 'iren-content');
      renderStock(d.infq, 'infq-content');
      renderStock(d.tsla, 'tsla-content');
      renderStock(d.coin, 'coin-content');
      renderStock(d.crcl, 'crcl-content');
      renderHype(d.hype);
    } catch(err) {
      console.error('브리핑 데이터 파싱 오류:', err);
    }
  });
</script>

</body>
